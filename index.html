<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="main">
    <img class="logo" src="./assets/images/logo.png" alt="logo">
    <h1>We are a (Not) Creative Design Agency</h1>
    <div class="left card"><img class="tile-image" src="./assets/images/blue-ocean.jpg" alt="blue ocean">
      <div class="firstText">
        <h2 class="card-title">Blue SEA</h2>
        <p class="card-text">We can create a poster image like blue sea but not the <span style="color: blue;">Real SEA</span></p>
      </div>
    </div>

    <div class="right card"><img class="tile-image" src="./assets/images/forest.JPG" alt="green forest">
      <div class="secondText">
        <h2 class="card-title">Natural Forest</h2>
        <p>For your purchase, it will help forest grow faster (We think)</p>
      </div>
    </div>

  </div>
  <footer>
    <p>Create. Build and Who Knows?</p>
  </footer>
</body>

</html>
